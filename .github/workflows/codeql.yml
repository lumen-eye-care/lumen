name: CodeQL

# Static analysis (SAST) for the storefront. Required by the repo "Safety"
# ruleset, which gates merges to main on a CodeQL code-scanning result
# (errors / high-or-higher severity). Runs on PRs + pushes to the long-lived
# branches, plus a weekly sweep to catch newly-published advisories.

on:
  pull_request:
  push:
    branches: [main, staging]
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC

jobs:
  analyze:
    name: CodeQL analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        # Single CodeQL language covering both JS and TS sources.
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@v7
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          language: ${{ matrix.language }}
          # security-and-quality adds maintainability/quality queries on top of
          # the default security pack.
          queries: security-and-quality
      # JS/TS needs no build step — CodeQL analyses the source directly.
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
