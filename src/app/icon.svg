<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- Lumen favicon: the glasses logomark (no wordmark), transparent background.
       With no tile, the thin stroke has to read on both light and dark browser
       chrome, so it adapts via prefers-color-scheme: brand blue on light UI,
       cream on dark UI. Mark scaled up to fill the square now that the tile's
       padding is gone. -->
  <style>
    :root { --mark: #0F4C81; }
    @media (prefers-color-scheme: dark) {
      :root { --mark: #FAF7F2; }
    }
  </style>
  <g transform="translate(2.5 15) scale(0.95)" fill="none" stroke="var(--mark)"
     stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="14" cy="18" r="11"/>
    <circle cx="48" cy="18" r="11"/>
    <path d="M25 16 Q31 12 37 16"/>
    <path d="M6 11 L1.5 8"/>
    <path d="M56 11 L60.5 8"/>
  </g>
</svg>
